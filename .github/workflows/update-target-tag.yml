name: Update tag in external repository

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'New tag value to set'
        required: false
        default: '2.0.0'
      commit_message:
        description: 'Commit message to use when updating the file.'
        required: false
        default: 'Update tag via workflow'

jobs:
  update-tag:
    runs-on: ubuntu-latest
    name: Checkout target repo, update tag, and push
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: mskrishna2808/testing_gha_target
          token: ${{ secrets.PAT_TOKEN }}
          path: target_repo
          fetch-depth: 0

      - name: Show info
        run: |
          echo "Target repo: mskrishna2808/testing_gha_target"
          echo "Target path: test.yml"
          echo "New tag: ${{ inputs.tag }}"

      - name: Update tag in file
        working-directory: target_repo
        run: |
          set -e
          FILE_PATH="test.yml"
          NEW_TAG="${{ inputs.tag }}"
          if [ ! -f "$FILE_PATH" ]; then
            echo "File not found: $FILE_PATH"
            exit 1
          fi

          echo "Current file content (head):"
          sed -n '1,120p' "$FILE_PATH" || true

          # Replace a YAML 'tag: x.y.z' line with the new tag. If no existing tag line, append it.
          if grep -qE '^\s*tag:\s*[0-9]+\.[0-9]+\.[0-9]+' "$FILE_PATH"; then
            sed -E -i "s/^([[:space:]]*tag:[[:space:]]*)[0-9]+\.[0-9]+\.[0-9]+/\1${NEW_TAG}/" "$FILE_PATH"
            echo "Replaced existing tag with ${NEW_TAG}"
          else
            echo "tag: ${NEW_TAG}" >> "$FILE_PATH"
            echo "Appended tag: ${NEW_TAG}"
          fi

          echo "Resulting file content (head):"
          sed -n '1,120p' "$FILE_PATH" || true

      - name: Commit & push change
        working-directory: target_repo
        env:
          COMMIT_MESSAGE: ${{ inputs.commit_message }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "test.yml"
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "${COMMIT_MESSAGE}: set tag to ${{ inputs.tag }}"
          # Push back to the repo using the token provided to actions/checkout
          git push origin HEAD
