name: Update tag in external repository
name: Update tag in external repository

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'New tag value to set'
        required: false
        default: '2.0.0'
      commit_message:
        description: 'Commit message to use when updating the file.'
        required: false
        default: 'Update tag via workflow'

jobs:
  update-tag:
    runs-on: ubuntu-latest
    name: Checkout target repo, update image tag, and push
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: mskrishna2808/testing_gha_target
          token: ${{ secrets.PAT_TOKEN }}
          path: target_repo
          fetch-depth: 0

      - name: Show info
        run: |
          echo "Target repo: mskrishna2808/testing_gha_target"
          echo "Target path: test.yml"
          echo "New tag: ${{ inputs.tag }}"

      - name: Update image tag in file
        working-directory: target_repo
        run: |
          set -euo pipefail
          FILE_PATH="test.yml"
          NEW_TAG="${{ inputs.tag }}"
          if [ ! -f "$FILE_PATH" ]; then
            echo "File not found: $FILE_PATH"
            exit 1
          fi

          echo "Current file content (head):"
          sed -n '1,160p' "$FILE_PATH" || true

          # Replace the tag in lines like: image: user/repo:1.0.0
          if grep -qE '^\s*image:\s*.+:[0-9]+\.[0-9]+\.[0-9]+' "$FILE_PATH"; then
            sed -E -i "s|^([[:space:]]*image:[[:space:]]*.+:)[0-9]+\.[0-9]+\.[0-9]+(\s*)$|\1${NEW_TAG}\2|" "$FILE_PATH"
            echo "Replaced image tag with ${NEW_TAG}"
          else
            echo "No image tag matching semantic version found. No change made."
            exit 0
          fi

          echo "Resulting file content (head):"
          sed -n '1,160p' "$FILE_PATH" || true

      - name: Commit & push change
        working-directory: target_repo
        env:
          COMMIT_MESSAGE: ${{ inputs.commit_message }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "test.yml"
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "${COMMIT_MESSAGE}: set image tag to ${{ inputs.tag }}"
          git push origin HEAD
