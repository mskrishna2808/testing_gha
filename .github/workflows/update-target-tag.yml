name: Update tag in external repository
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'New tag value to set'
        required: false
        default: '2.0.0'
      commit_message:
        description: 'Commit message to use when updating the file.'
        required: false
        default: 'Update tag via workflow'

jobs:
  update-tag:
    runs-on: ubuntu-latest
    name: Checkout target repo, update image tag, and push
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: mskrishna2808/testing_gha_target
          token: ${{ secrets.PAT_TOKEN }}
          path: target_repo
          fetch-depth: 0

      - name: Show info
        run: |
          echo "Target repo: mskrishna2808/testing_gha_target"
          echo "Target path: test.yml"
          echo "New tag: ${{ inputs.tag }}"

      - name: Update image tag in file
        working-directory: target_repo
        run: |
          set -euo pipefail
          FILE_PATH="test.yml"
          NEW_TAG="${{ inputs.tag }}"
          if [ ! -f "$FILE_PATH" ]; then
            echo "File not found: $FILE_PATH"
            exit 1
          fi

          echo "Current file content (head):"
          sed -n '1,200p' "$FILE_PATH" || true

          # Extract the image value (first occurrence) after 'image:'
          IMAGE_LINE=$(sed -n 's/^[[:space:]]*image:[[:space:]]*\(.*\)/\1/p' "$FILE_PATH" | head -n1 || true)
          if [ -z "$IMAGE_LINE" ]; then
            echo "No image line found. No change made."
            exit 0
          fi

          # Remove surrounding quotes if any
          IMAGE_VAL="$IMAGE_LINE"
          if [[ "$IMAGE_VAL" =~ ^['\"](.*)['\"]$ ]]; then
            IMAGE_VAL="${BASH_REMATCH[1]}"
            QUOTE=1
          else
            QUOTE=0
          fi

          # If there's no ':' in IMAGE_VAL, can't determine tag
          if [[ "$IMAGE_VAL" != *":"* ]]; then
            echo "Image value has no tag separator ':'; no change made."
            exit 0
          fi

          # Prefix is everything before the last ':'; this preserves registry:port parts
          PREFIX="${IMAGE_VAL%:*}"
          NEW_IMAGE="${PREFIX}:${NEW_TAG}"

          # Escape slashes & ampersands for sed
          ESC_NEW_IMAGE=$(printf '%s' "$NEW_IMAGE" | sed -e 's/[\/&]/\\&/g')

          # Replace the first image: line's value while preserving any surrounding quotes and indentation
          sed -E -i "0,/^[[:space:]]*image:[[:space:]]*/s|^([[:space:]]*image:[[:space:]]*)([\"']?)(.*)([\"']?)$|\1\2${ESC_NEW_IMAGE}\4|" "$FILE_PATH"

          echo "Replaced image with: $NEW_IMAGE"
          echo "Resulting file content (head):"
          sed -n '1,200p' "$FILE_PATH" || true

      - name: Commit & push change
        working-directory: target_repo
        env:
          COMMIT_MESSAGE: ${{ inputs.commit_message }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "test.yml"
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "${COMMIT_MESSAGE}: set image tag to ${{ inputs.tag }}"
          git push origin HEAD
